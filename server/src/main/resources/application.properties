spring.config.import=optional:file:.env[.properties]
spring.application.name=tempus
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.profiles.active=dev
spring.session.jdbc.initialize-schema=always


# DDL generation
spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

#NEO4J
spring.neo4j.uri=${NEO_URL}
spring.neo4j.authentication.username=${NEO_USER}
spring.neo4j.authentication.password=${NEO_PASSWORD}

logging.level.org.springframework.data.neo4j=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.level.org.neo4j.driver=DEBUG

# Configuracion de Hibernate para usar archivos XML
spring.jpa.mapping-resources=hibernate/Materia.hbm.xml, hibernate/Carrera.hbm.xml, hibernate/Comision.hbm.xml, hibernate/Usuario.hbm.xml, hibernate/Horario.hbm.xml, hibernate/ClaseHorario.hbm.xml